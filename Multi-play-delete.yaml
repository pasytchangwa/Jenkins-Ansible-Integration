---
- name: Remove Apache from Web Servers
  hosts: webservers
  become: yes

  tasks:
    - name: Stop Apache service
      ansible.builtin.service:
        name: apache2
        state: stopped
      ignore_errors: yes

    - name: Disable Apache service
      ansible.builtin.service:
        name: apache2
        enabled: no
      ignore_errors: yes

    - name: Uninstall Apache2
      ansible.builtin.apt:
        name: apache2
        state: absent
        purge: yes
        autoremove: yes
        update_cache: yes

- name: Remove MariaDB from Database Servers
  hosts: dbservers
  become: yes

  tasks:
    - name: Stop MariaDB service
      ansible.builtin.service:
        name: mariadb
        state: stopped
      ignore_errors: yes

    - name: Disable MariaDB service
      ansible.builtin.service:
        name: mariadb
        enabled: no
      ignore_errors: yes

    - name: Uninstall MariaDB
      ansible.builtin.apt:
        name: mariadb-server
        state: absent
        purge: yes
        autoremove: yes
        update_cache: yes
